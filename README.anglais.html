# Presentation Website - S.A.E. 1.04 (IUT of Béthune)

## 📋 Project Presentation
This project is my online personal portfolio, developed as part of my first year of the **BUT Networks & Telecommunications** degree at the IUT of Béthune.

It is a static and responsive website designed to showcase my academic background, technical skills in networks and systems, as well as the projects I have completed (SAE). The website integrates a multilingual feature (French/English).

## 🛠️ Technologies and Libraries Used
The website was built using the following technologies and libraries:

* **Languages**: HTML5, CSS3, JavaScript.
* **CSS Framework**: [Bootstrap 5.3.8](https://getbootstrap.com/).
* **JS Libraries**:
    * *AOS* (Animate On Scroll) for scroll animations.
    * *Isotope Layout* for filtering the portfolio gallery.
    * *GLightbox* to display images in "lightbox" mode.
    * *Swiper* for touch-friendly touch sliders.
    * *Typed.js* (used for typewriter text effects).
* **Icons**: Bootstrap Icons.

## 🚀 Features
* **Responsive Design**: Optimized for all screens (mobile, tablet, desktop) using the Bootstrap framework.
* **Intuitive Navigation**: "One Page" menu with smooth scroll transitions to sections (Home, About, Skills, Resume, Portfolio).
* **Dynamic Filtering**: Portfolio section filterable by skill category (Administer, Connect, Program, Secure).
* **Animations**: Integrated AOS (Animate On Scroll) library to make elements fade in dynamically.
* **Multilingual Support**: Structure ready for internationalization (with files `index.html` and `index.anglais.html`).

## 📁 Repository Structure

/
├── index.html                   # Main page (French version)

```

- Develop autonomy in learning web development languages.
