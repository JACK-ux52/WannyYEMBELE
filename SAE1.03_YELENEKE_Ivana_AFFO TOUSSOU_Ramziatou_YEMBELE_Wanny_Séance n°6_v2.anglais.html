# **6th session (2h): SAE v2 summary**

#### **Objective**: Perform measurements and present results to a client

- Equivalent schematic:
  ![][image1]
  r = 61 [Ω/km] => 61 [Ω/km]/1000 = 0.061 [Ω/m]
  c = 52.8 [pF/m] => 52.8 × 10-12 [F/m] = 5.28 × 10-11 [F/m]
  l = Zc² x c => 75² [Ω] × 5.28 × 10-11 [F/m] = 2.97 × 10-7 [H/m]

- Frequency response of this cable for both lengths:

  5 m:
  For 5 m, values are:
  * r => 0.061 [Ω/m] x 5 [m] = 0.305 [Ω]
  * c => 52.8 × 10-11 [F/m] x 5 [m] = 2.64 × 10-9 [F]
  * l => 2.97 × 10-7 [H/m] x 5 [m] = 1.485 × 10-6 [H]
  Frequency response is equal to: f = 1/2π x Z x c => 1/(2π x 75 x 2.64 × 10-9) = 0.803 MHz

  20 m:
  For 20 m, values are:
  * r => 0.061 [Ω/m] x 20 [m] = 1.22 [Ω]
  * c => 52.8 × 10-11 [F/m] x 20 [m] = 1.056 × 10-8 [F]
  * l => 2.97 × 10-7 [H/m] x 20 [m] = 5.92 × 10-6 [H]
  Frequency response is equal to: f = 1/2π x Z x c => 1/(2π x 75 x 1.056 × 10-8) = 0.201 MHz

Over 5 m, the estimated frequency is 0.803 MHz, which is a relatively low frequency and attenuation is relatively low.
![][image2]
Over 20 m, the estimated frequency is 0.201 MHz, which is a lower frequency than at 5 m, and attenuation is much higher.
![][image3]
The cable therefore behaves like a low-pass filter.

- Transmission delay:

For 5 m, we have:
T = l/v where l is the cable length = 5m and v is the propagation speed
=> T = 5 [m] / (0.78 × 3 × 10^8) = 2.14 × 10^-8 [s] = 21.4 [ns]

For 20 m, we have:
T = l/v where l is the cable length = 20 m and v is the propagation speed
=> T = 20 [m] / (0.78 × 3 × 10^8) = 8.55 × 10^-8 [s] = 85.5 [ns]

The results show that the cable transmission delay depends on its length. For a length of 5m, the transmission delay is approximately 21.4ns, whereas for a length of 20m, the transmission delay is approximately 85.5ns.

This information is important for the design and optimization of transmission systems using this type of cable.
