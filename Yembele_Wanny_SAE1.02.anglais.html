# Technical Report - Lab 2 - SAE 1.02

## Objective

Creation of the mock-up of the company's network sector and logging of tests and results.

## Router Choice

Cisco Packet Tracer provides three routers from the 800 series, each with their own specifications. We will choose the one that is most suitable for our project.

### Router 829

The Cisco IR829 is a more robust and high-performing version, often used for fleet management and transport.

- **Performance and Connectivity:** It supports Dual Active LTE (on some models), allowing simultaneous connectivity to two cellular networks for redundancy and load balancing. It features 4 Gigabit Ethernet LAN ports with optional PoE/PoE+ support (up to 30W).

- **Advanced Sensors:** Unlike the 819 models, the IR829 integrates an accelerometer and a gyroscope to monitor speed and angular motion, as well as power management linked to the vehicle's ignition.

- **Application Hosting:** It is natively designed for the Cisco IOx environment, enabling the execution of edge computing applications at the network periphery.

- **Resistance:** It supports extreme temperatures ranging from -40°C to +60°C (tested up to +85°C).

### Router 819HGW

The HGW suffix in its name means it is a Hardened version with integrated Wi-Fi.

- **Robustness (Hardened):** The "H" indicates it uses industrial-grade components to withstand harsh environments, with an operating temperature range of -25°C to 60°C.

- **Wireless Connectivity (GW):** The "GW" specifies that it integrates both wireless WAN (3G/3.7G) and wireless LAN (WLAN) capabilities. It has an integrated dual-radio Wi-Fi access point (802.11a/b/g/n).

- **Technical Limits:** Unlike the IR829, its LAN ports are generally Fast Ethernet (10/100) instead of Gigabit. Its maximum power consumption is about 20 watts.

### Router 819IOX

The term 819IOX (often identified as the ISR 819HG-4G-IOX model) refers to a variant of the 819 router capable of operating as a "fog" node.

- **Fog Computing:** Its main difference lies in its ability to host applications in virtual machines (VMs) via a hypervisor. It uses a Yocto Linux distribution to run local services.

- **Use Case:** It is specifically used for local interaction with industrial IoT devices, allowing, for example, the translation of proprietary protocols into IP directly on the router.

- **Resources:** As a "fog" node, it requires a specific configuration of internal network connectivity for VMs, including virtual port groups (VirtualPortGroup).

### Choice

The 829 router is the best choice for our project because it has Gigabit ports which are useful for connecting to the switch. Moreover, it features PoE support that can be used to power the devices on the VIDEO network, and it has advanced sensors that allow for more effective monitoring of the sector.
