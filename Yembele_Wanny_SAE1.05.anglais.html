# **Portfolio SAE 1.05**

### **SAE Objective**

Retrieve CSV data over a network, process/filter it, transform it into JSON format, and transmit it automatically to the Quickchart web server.

### **Skills**

As the lead developer for the "Filtering and Analysis" section of the script, I mobilized the following skills:

* AC13.01 Use a computer system and its tools
* AC13.03 Translate an algorithm, in a given language and environment
* AC13.05 Choose data management mechanisms suitable for tool development and justify choices

Along with the combined resources:

* R1.07 Fundamentals of programming
* R1.08 Basics of operating systems
* R1.06 Digital and computer systems architecture

Furthermore, collaborating on the script writing mobilized additional skills, used to support my teammates, such as:

* RT3 Create IT tools and applications for R&T
* AC13.02 Read, execute, debug and modify a program
* AC13.04 Understand the architecture and technologies of a website
* AC13.06 Integrate into an environment conducive to development and collaborative work

Along with resources:

* R1.11 Professional Expression-Culture-Communication
* R1.15 Project management
* R1.09 Introduction to Web technologies

### **Use**

Skills AC13.01, AC13.03, and AC13.05 were mobilized throughout the creation of my contribution. First, using a computer system and its tools was essential in developing this script, requiring hardware (computer and its components), an operating system (Linux OS), specific software (VS Code, web browser), and data manipulation (CSV files). Second, the algorithm translation was done in a Python 3 environment, using the Python language, and selecting appropriate data management mechanisms, notably the pandas library for data analysis and manipulation.

Skills RT3, AC13.02, AC13.04, and AC13.06 were implemented in the overall realization of the project. They enabled the creation and modification of the script, ensuring exporting to the web server, and guaranteeing effective communication and collaboration within the team.
