  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // Get the file name passed in the URL (e.g. ?file=mon_projet.md)
      const urlParams = new URLSearchParams(window.location.search);
      const fileName = urlParams.get('file');
      const contentDiv = document.getElementById('markdown-content');

      if (fileName) {
        // Fetch the content of the file
        fetch(fileName)
          .then(response => {
            if (!response.ok) throw new Error("File not found");
            return response.text();
          })
          .then(text => {
            // Convert Markdown to HTML and insert it into the page
            contentDiv.innerHTML = marked.parse(text);
          })
          .catch(error => {
            contentDiv.innerHTML = `
              <div class="alert alert-danger text-center">
                <h4><i class="bi bi-exclamation-triangle"></i> Error loading</h4>
                <p>Unable to find the file <strong>${fileName}</strong></p>
                <a href="index.anglais.html#portfolio" class="btn btn-outline-danger mt-3">Back to projects</a>
              </div>`;
          });
      } else {
        contentDiv.innerHTML = `
          <div class="alert alert-warning text-center">
            <h4><i class="bi bi-info-circle"></i> No file specified</h4>
            <a href="index.anglais.html#portfolio" class="btn btn-outline-warning mt-3">Back to projects</a>
          </div>`;
      }
    });
  </script>
